    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .pipeline-column { min-height: 500px; transition: all 0.3s ease; }
        .pipeline-column.drag-over { background: #e0e7ff; border: 2px dashed #6366f1; }
        .contact-card { transition: all 0.2s ease; cursor: grab; }
        .contact-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .contact-card.dragging { opacity: 0.5; cursor: grabbing; }
        .metric-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .email-preview { font-family: 'Georgia', serif; line-height: 1.6; }
        .sidebar-item.active { background: #e0e7ff; color: #4f46e5; border-right: 3px solid #4f46e5; }
        .toast { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .heatmap-cell { width: 12px; height: 12px; border-radius: 2px; }
        .heatmap-grid { display: grid; grid-template-columns: 40px repeat(24, 1fr); gap: 2px; }
        .config-panel { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .status-connected { background: #10b981; box-shadow: 0 0 8px #10b981; }
        .status-disconnected { background: #ef4444; }
        .tracking-badge { position: absolute; top: -4px; right: -4px; width: 8px; height: 8px; background: #10b981; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
<base target="_blank">
</head>
